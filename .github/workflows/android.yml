name: Android APK

on:
  push:
    paths-ignore:
      - 'downloads/**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: sdkmanager --install "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: 9.4.1

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v5
        with:
          name: pocketforge-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Publish debug APK into repo files
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p downloads
          cp app/build/outputs/apk/debug/app-debug.apk downloads/pocketforge-debug.apk
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f downloads/pocketforge-debug.apk
          if git diff --cached --quiet; then
            echo "APK file is unchanged."
          else
            git commit -m "Publish debug APK"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
